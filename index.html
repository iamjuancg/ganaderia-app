<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="description" content="Gestión de ganadería: animales, contabilidad e informes">
  <title>GanaderíaApp</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!-- Sidebar desktop -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">🐄</span>
      <span class="sidebar-name" id="sidebar-explotacion">GanaderíaApp</span>
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Colapsar menú" title="Colapsar menú">&#8249;</button>
    </div>
    <nav class="sidebar-nav">
      <a href="#dashboard" class="nav-item" data-view="dashboard" title="Dashboard">
        <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
      </a>
      <a href="#animales" class="nav-item" data-view="animales" title="Animales">
        <span class="nav-icon">🐄</span><span class="nav-label">Animales</span>
      </a>
      <a href="#eventos" class="nav-item" data-view="eventos" title="Eventos">
        <span class="nav-icon">📋</span><span class="nav-label">Eventos</span>
      </a>
      <a href="#finanzas" class="nav-item" data-view="finanzas" title="Finanzas">
        <span class="nav-icon">💰</span><span class="nav-label">Finanzas</span>
      </a>
      <a href="#informes" class="nav-item" data-view="informes" title="Informes">
        <span class="nav-icon">📈</span><span class="nav-label">Informes</span>
      </a>
      <a href="#ajustes" class="nav-item" data-view="ajustes" title="Ajustes">
        <span class="nav-icon">⚙️</span><span class="nav-label">Ajustes</span>
      </a>
    </nav>
  </aside>

  <!-- Contenido principal -->
  <main class="main-content" id="main-content">
    <div id="view-container"></div>
  </main>

  <!-- Nav inferior móvil -->
  <nav class="bottom-nav" id="bottom-nav">
    <a href="#dashboard" class="nav-item" data-view="dashboard">
      <span class="nav-icon">📊</span><span class="nav-label">Inicio</span>
    </a>
    <a href="#animales" class="nav-item" data-view="animales">
      <span class="nav-icon">🐄</span><span class="nav-label">Animales</span>
    </a>
    <a href="#eventos" class="nav-item" data-view="eventos">
      <span class="nav-icon">📋</span><span class="nav-label">Eventos</span>
    </a>
    <a href="#finanzas" class="nav-item" data-view="finanzas">
      <span class="nav-icon">💰</span><span class="nav-label">Finanzas</span>
    </a>
    <a href="#informes" class="nav-item" data-view="informes">
      <span class="nav-icon">📈</span><span class="nav-label">Informes</span>
    </a>
    <a href="#ajustes" class="nav-item" data-view="ajustes">
      <span class="nav-icon">⚙️</span><span class="nav-label">Ajustes</span>
    </a>
  </nav>

  <!-- Contenedor de modales -->
  <div id="modal-container"></div>

  <!-- Toast notifications -->
  <div id="toast-container" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
